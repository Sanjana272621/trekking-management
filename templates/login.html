{% extends "base.html" %}

{% block content %}

<div class="row justify-content-center">
    <div class="col-md-5">

        <div class="card shadow-sm">
            <div class="card-body">

                <h2 class="mb-4 text-center">Login</h2>

                <form method="POST">

                    <div class="mb-3">
                        <label class="form-label">Email</label>
                        <input
                            type="email"
                            name="email"
                            class="form-control"
                            required
                        >
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Password</label>
                        <input
                            type="password"
                            name="password"
                            class="form-control"
                            required
                        >
                    </div>

                    <button type="submit" class="btn btn-success w-100">
                        Login
                    </button>

                </form>

                <hr>

                <p class="text-center mb-1">
                    New trekker?
                    <a href="{{ url_for('register', role='user') }}">
                        Register as User
                    </a>
                </p>

                <p class="text-center mb-0">
                    Trek staff?
                    <a href="{{ url_for('register', role='staff') }}">
                        Register as Staff
                    </a>
                </p>

            </div>
        </div>

    </div>
</div>

{% endblock %}
