{% extends "base.html" %}

{% block content %}

<div class="row justify-content-center">
    <div class="col-md-6">

        <h2>
            Register as
            {% if role == "staff" %}
                Trek Staff
            {% else %}
                Trekker
            {% endif %}
        </h2>

        <form method="POST">

            <div class="mb-3">
                <label>Name</label>
                <input
                    type="text"
                    name="name"
                    class="form-control"
                    required
                >
            </div>

            <div class="mb-3">
                <label>Email</label>
                <input
                    type="email"
                    name="email"
                    class="form-control"
                    required
                >
            </div>

            <div class="mb-3">
                <label>Contact Number</label>
                <input
                    type="text"
                    name="contact"
                    class="form-control"
                >
            </div>

            <div class="mb-3">
                <label>Password</label>
                <input
                    type="password"
                    name="password"
                    class="form-control"
                    required
                >
            </div>

            <button class="btn btn-success">
                Register
            </button>

        </form>

    </div>
</div>

{% endblock %}
