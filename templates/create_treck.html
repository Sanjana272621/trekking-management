{% extends "base.html" %}

{% block content %}

<h2 class="mb-4">Create New Trek</h2>

<a href="{{ url_for('admin_treks') }}" class="btn btn-secondary mb-3">
    Back to Treks
</a>

<form method="POST">

    <div class="row">

        <div class="col-md-6 mb-3">
            <label class="form-label">Trek Name</label>
            <input type="text"
                   name="trek_name"
                   class="form-control"
                   required>
        </div>

        <div class="col-md-6 mb-3">
            <label class="form-label">Location</label>
            <input type="text"
                   name="location"
                   class="form-control"
                   required>
        </div>

    </div>

    <div class="row">

        <div class="col-md-4 mb-3">
            <label class="form-label">Difficulty</label>
            <select name="difficulty" class="form-select" required>
                <option value="">Select Difficulty</option>
                <option value="Easy">Easy</option>
                <option value="Moderate">Moderate</option>
                <option value="Hard">Hard</option>
            </select>
        </div>

        <div class="col-md-4 mb-3">
            <label class="form-label">Duration in Days</label>
            <input type="number"
                   name="duration"
                   class="form-control"
                   min="1"
                   required>
        </div>

        <div class="col-md-4 mb-3">
            <label class="form-label">Total Slots</label>
            <input type="number"
                   name="total_slots"
                   class="form-control"
                   min="1"
                   required>
        </div>

    </div>

    <div class="row">

        <div class="col-md-6 mb-3">
            <label class="form-label">Start Date</label>
            <input type="date"
                   name="start_date"
                   class="form-control"
                   required>
        </div>

        <div class="col-md-6 mb-3">
            <label class="form-label">End Date</label>
            <input type="date"
                   name="end_date"
                   class="form-control"
                   required>
        </div>

    </div>

    <div class="row">

        <div class="col-md-6 mb-3">
            <label class="form-label">Assigned Staff</label>
            <select name="assigned_staff_id" class="form-select">
                <option value="">Assign Later</option>

                {% for staff in staff_members %}
                    <option value="{{ staff['user_id'] }}">
                        {{ staff["name"] }}
                    </option>
                {% endfor %}
            </select>
        </div>

        <div class="col-md-6 mb-3">
            <label class="form-label">Status</label>
            <select name="status" class="form-select" required>
                <option value="Pending">Pending</option>
                <option value="Approved">Approved</option>
                <option value="Open">Open</option>
                <option value="Closed">Closed</option>
            </select>
        </div>

    </div>

    <div class="mb-3">
        <label class="form-label">Description</label>
        <textarea name="description"
                  class="form-control"
                  rows="4"></textarea>
    </div>

    <button class="btn btn-success">
        Create Trek
    </button>

</form>

{% endblock %}
